<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Events</title>
</head>

<body>
    <h1>JavaScript Event Handling</h1>

    <section id="mouse-section">
        <h3>Mouse Events</h3>
        <button id="hoverBtn">Hover me!</button>
        <p id="mouseMsg">Waiting for hover...</p>
    </section>

    <section id="keyboard-section">
        <h3>Keyboard Events</h3>
        <input type="text" id="keyInput" placeholder="Type something...">
        <p id="keyMsg">Last key pressed: none</p>
    </section>

    <section id="form-section">
        <h3>Form Events</h3>
        <form id="form1">
            <input type="text" id="formInput" placeholder="Enter text" required>
            <button type="submit">Submit</button>
        </form>
        <p id="formMsg"></p>
    </section>

    <section id="focus-section">
        <h3>Focus Events</h3>
        <input type="text" id="focusInput" placeholder="Click here">
        <p id="focusMsg">Input not focused</p>
    </section>

    <section id="focus-section">
        <h3>Delegation Events</h3>
        <div id="btnContainer">
            <button data-label="Button 1">Button 1</button>
            <button data-label="Button 2">Button 2</button>
            <button data-label="Button 3">Button 3</button>
        </div>
        <p id="delegationMsg">Click a button above</p>
    </section>

</body>

</html>
