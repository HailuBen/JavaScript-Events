<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Events</title>
</head>

<body>
    <h1>JavaScript Event Handling</h1>

    <section id="mouse-section">
        <h3>Mouse Events</h3>
        <button id="hoverBtn">Hover me!</button>
        <p id="mouseMsg">Waiting for hover...</p>
    </section>

    <section id="keyboard-section">
        <h3>Keyboard Events</h3>
        <input type="text" id="keyInput" placeholder="Type something...">
        <p id="keyMsg">Last key pressed: none</p>
    </section>

    <section id="form-section">
        <h3>Form Events</h3>
        <form id="form1">
            <input type="text" id="formInput" placeholder="Enter text" required>
            <button type="submit">Submit</button>
        </form>
        <p id="formMsg"></p>
    </section>

    <section id="focus-section">
        <h2>Focus Events</h2>
        <input type="text" id="focusInput" placeholder="Click here">
        <p id="focusMsg">Input not focused</p>
    </section>

</body>

</html>
